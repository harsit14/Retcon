# Public real-model replay-buffer demo using the synthetic LumenAcre corpus.
schema_version: 1
project:
  name: retcon-synthetic-qwen-0-6b-replay
  description: Qwen 0.6B synthetic demo with replay-buffer retention mitigation.
  tags:
    - synthetic
    - qwen
    - replay
base_model:
  model_id: Qwen/Qwen3-0.6B-Base
  revision: main
  trust_remote_code: true
data_sources:
  - id: synthetic_lumenacre
    type: local_file
    uri: examples/synthetic/domain.jsonl
    role: domain
    license: project-internal
    metadata:
      source_group: synthetic
      text_field: text
      id_field: id
  - id: synthetic_replay_general
    type: local_file
    uri: examples/synthetic/replay_general.jsonl
    role: replay_general
    license: project-internal
    metadata:
      source_group: synthetic_replay
      text_field: text
      id_field: id
cleaning:
  min_chars: 100
  max_chars: 20000
tokenization:
  tokenizer_backend: hf
  allow_remote_tokenizer_download: true
  validation_ratio: 0.05
  validation_min_blocks: 1
  replay_ratio: 0.2
training:
  mode: adapter_dapt
  seed: 13
  max_steps: 5
  sequence_length: 512
  train_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  eval_every_steps: 5
  save_every_steps: 5
  adapter:
    type: lora
    rank: 4
    alpha: 8
    dropout: 0.05
    target_modules:
      - q_proj
      - v_proj
evaluation:
  domain:
    - id: synthetic_domain_surface
      kind: surface
      path: examples/synthetic/eval/domain_surface.jsonl
      metric: perplexity
      split: eval
      license: project-internal
      metadata:
        id_field: id
        text_field: text
    - id: synthetic_domain_recall
      kind: recall
      path: examples/synthetic/eval/domain_recall.jsonl
      metric: exact_match
      split: eval
      license: project-internal
      metadata:
        id_field: id
    - id: synthetic_domain_application
      kind: application
      path: examples/synthetic/eval/domain_application.jsonl
      metric: exact_match
      split: eval
      license: project-internal
      metadata:
        id_field: id
    - id: synthetic_domain_qualitative
      kind: qualitative
      metric: sample
      split: eval
      license: project-internal
  general:
    - id: synthetic_general_surface
      kind: general
      path: examples/synthetic/eval/general_surface.jsonl
      metric: perplexity
      split: eval
      license: project-internal
      metadata:
        id_field: id
        text_field: text
  lm_eval_tasks:
    - hellaswag
  context_length: 1024
  stride: 512
  qualitative_prompts:
    - Summarize the LumenAcre safety routine.
  evaluator_backend: hf_causal_lm
  allow_remote_model_download: true
  allow_proxy_fallback: false
  max_new_tokens: 64
  qualitative_sample_count: 3
reliability:
  repeated_baseline_evals: 1
  bootstrap_samples: 50
comparison:
  matched_token_budget: true
  matched_eval_cadence: true
  matched_model_revision: true
  matched_sequence_length: true
  seed_policy: single_seed_exploratory
strategy:
  name: replay_buffer
  matching_protocol: matched_token
  replay_buffer:
    ratio: 0.2
runtime:
  runs_dir: runs
  data_dir: data
dashboard:
  host: 127.0.0.1
  port: 8501
