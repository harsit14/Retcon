schema_version: 1
project:
  name: cplab-dev-qwen-0-6b
  description: Cheap development configuration for QLoRA adapter experiments.
  tags:
    - dev
    - qwen
    - qlora
base_model:
  model_id: Qwen/Qwen3-0.6B-Base
  revision: main
  trust_remote_code: true
data_sources: []
cleaning:
  unicode_normalization: NFKC
  remove_control_chars: true
  collapse_whitespace: true
  remove_repeated_lines: true
  min_chars: 200
  max_chars: 50000
  language: en
  min_alphabetic_ratio: 0.25
  max_duplicate_line_ratio: 0.6
  boilerplate_phrases:
    - enable javascript
    - cookie policy
    - all rights reserved
dedup:
  exact_hash: true
  normalized_hash: true
  near_dedup: true
  minhash_threshold: 0.85
  minhash_shingle_size: 5
  minhash_num_perm: 64
contamination:
  ngram_size: 13
  overlap_threshold: 0.2
  handling_mode: remove
  allow_contaminated: false
  report_sample_limit: 20
tokenization:
  tokenizer_backend: auto
  allow_remote_tokenizer_download: false
  add_eos_between_documents: true
  validation_ratio: 0.05
  validation_min_blocks: 1
  drop_remainder: false
  replay_ratio: null
  output_format: parquet
training:
  mode: adapter_dapt
  seed: 13
  max_steps: 200
  sequence_length: 2048
  train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  eval_every_steps: 25
  save_every_steps: 100
  adapter:
    type: qlora
    rank: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
    modules_to_save: []
  precision:
    load_precision: bf16
    compute_dtype: bf16
    quantization: nf4_4bit
    double_quantization: true
  distillation:
    enabled: false
    reference_policy: none
evaluation:
  domain:
    - id: dev_domain_surface
      kind: surface
      path: examples/eval/domain_surface.jsonl
      metric: perplexity
      split: eval
      license: project-internal
      metadata:
        id_field: id
        text_field: text
    - id: dev_domain_recall
      kind: recall
      path: examples/eval/domain_recall.jsonl
      metric: exact_match
      split: eval
      license: project-internal
      metadata:
        id_field: id
    - id: dev_domain_application
      kind: application
      path: examples/eval/domain_application.jsonl
      metric: exact_match
      split: eval
      license: project-internal
      metadata:
        id_field: id
    - id: dev_domain_qualitative
      kind: qualitative
      metric: sample
      split: eval
      license: project-internal
  general:
    - id: dev_general_surface
      kind: general
      path: examples/eval/general_surface.jsonl
      metric: perplexity
      split: eval
      license: project-internal
      metadata:
        id_field: id
        text_field: text
  lm_eval_tasks:
    - hellaswag
    - arc_easy
  context_length: 2048
  stride: 1024
  evaluator_backend: auto
  allow_remote_model_download: false
  max_new_tokens: 64
  qualitative_sample_count: 3
  qualitative_prompts:
    - Give a concise domain answer with citations where possible.
reliability:
  repeated_baseline_evals: 2
  bootstrap_samples: 200
  require_noise_floor_for_alerts: true
  single_seed_exploratory: true
  metric_noise_floors: {}
comparison:
  matched_token_budget: true
  matched_eval_cadence: true
  matched_model_revision: true
  matched_sequence_length: true
  seed_policy: single_seed_exploratory
cost:
  currency: USD
  gpu_hourly_cost: 0.0
  cpu_hourly_cost: 0.0
runtime:
  runs_dir: runs
  data_dir: data
  sqlite_timeout_seconds: 30.0
  events_jsonl_mirror: true
dashboard:
  host: 127.0.0.1
  port: 8501
  auto_refresh_seconds: 5
